apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: gv-metallb-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.56.100-192.168.56.120
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: gv-metallb-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
    - gv-metallb-pool
